<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;

      padding: 0;
      font-size: 12px;
      color: #333;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .header {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e5e5;
    }

      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .title-row h1 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      color: #1a1a1a;
    }
    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 9999px;
      background: #eef2ff;
      color: #4f46e5;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    #status {
      font-weight: 500;
      font-size: 12px;
    }
    .hint {
      font-size: 11px;
      margin-top: 6px;
      line-height: 1.4;
    }
    .hint.ok { color: #16a34a; }
    .hint.warn { color: #b45309; }

    /* Steps */
    .steps {
      padding: 10px 14px;
      border-bottom: 1px solid #e5e5e5;
      background: #fafafa;
    }
    .steps-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 11px;
      color: #555;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .step-num {
      font-weight: 600;
      color: #4f46e5;
      flex-shrink: 0;
    }
    .step code {
      background: #e5e7eb;
      padding: 0 3px;
      border-radius: 3px;
      font-size: 10px;
      font-family: 'SF Mono', Consolas, monospace;
    }

    /* Counter */
    #counter {
      font-size: 11px;
      color: #888;
      padding: 6px 14px;
      border-bottom: 1px solid #e5e5e5;
    }

    /* Log */
    #log {
      font-size: 10px;
      font-family: 'SF Mono', Consolas, monospace;
      color: #888;
      padding: 8px 14px;
      overflow-y: auto;
      flex: 1;
      line-height: 1.5;
    }
    #log div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="header">

</html>
